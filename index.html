<!-- <div class="relative w-screen h-[500px] bg-[url('/assets/356cc7f0-b1d4-11f0-a11e-dfd9b60dad48-App-Banner-&-Web_desktop_image-2025-10-25185543.jpg')] bg-cover bg-center"></div> -->
 <div class="relative w-full overflow-hidden">

  <!-- Slides -->
  <div id="slider" class="flex transition-transform duration-500 ease-in-out">
    
    <img src="assets/banner.jpg" 
         class="w-full h-[180px] md:h-[350px] lg:h-[450px] object-cover flex-shrink-0">

    <img src="assets/banner2.jpg" 
         class="w-full h-[180px] md:h-[350px] lg:h-[450px] object-cover flex-shrink-0">

    <img src="assets/banner3.jpg" 
         class="w-full h-[180px] md:h-[350px] lg:h-[450px] object-cover flex-shrink-0">

  <img src="assets/banner4.jpg" 
         class="w-full h-[180px] md:h-[350px] lg:h-[450px] object-cover flex-shrink-0">
  </div>

  <!-- Left Button -->
  <button onclick="prevSlide()" 
    class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white px-2 md:px-3 py-1 md:py-2 rounded-full">
    ❮
  </button>

  <!-- Right Button -->
  <button onclick="nextSlide()" 
    class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white px-2 md:px-3 py-1 md:py-2 rounded-full">
    ❯
  </button>

</div>
<script>
let index = 0;
const slider = document.getElementById("slider");
const totalSlides = slider.children.length;

function updateSlider() {
  slider.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide() {
  index = (index + 1) % totalSlides;
  updateSlider();
}

function prevSlide() {
  index = (index - 1 + totalSlides) % totalSlides;
  updateSlider();
}
</script>
